# ═══════════════════════════════════════════════════════════
# 🧠 AGENTIC PORTFOLIO SYSTEM — Docker Compose (Simplified)
# ═══════════════════════════════════════════════════════════
# 9 services only — the load-bearing minimum.
# Add observability (prometheus/grafana) AFTER core AI works.
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose logs -f api        # Stream API logs
#   docker compose down -v            # Stop + remove volumes
#
# IMPORTANT: Copy .env.genesis → .env and fill in secrets
# ═══════════════════════════════════════════════════════════

# ── Shared environment variables (YAML anchor) ──
x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/portfolio_db
  SYNC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/portfolio_db
  OLLAMA_URL: http://host.docker.internal:11434
  REDIS_URL: redis://redis_cache:6379/0
  REDIS_PERSISTENT_URL: redis://redis_persistent:6379/0
  QDRANT_URL: http://qdrant:6333
  CELERY_BROKER_URL: redis://redis_persistent:6379/1
  CELERY_RESULT_BACKEND: redis://redis_persistent:6379/2
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  ENVIRONMENT: development
  LOG_LEVEL: INFO

services:

  # ───────────────────────────────────────────────────
  # 🌐 Next.js Frontend (Port 3000)
  # ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐍 FastAPI Backend (Port 8000)
  # ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      <<: *common-env
      # ── Observability ──
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

      # ── Security ──
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-}

      # ── LLM Model Routing ──
      LLM_MODEL_HEAVY: phi4-mini
      LLM_MODEL_MEDIUM: llama3.2:3b
      LLM_MODEL_LIGHT: qwen2.5:3b

      # ── Feature Flags (core only) ──
      FEATURE_CLI_MODE: "true"
      FEATURE_BUILD_WITH_ME: "true"
      FEATURE_VOICE_MODE: "true"
      FEATURE_3D_CONSTELLATION: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      redis_persistent:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚙️ Celery Worker (Async Task Processing)
  # ───────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🕐 Celery Beat (Scheduled Tasks)
  # ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐘 PostgreSQL + pgvector
  # ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🗄️ Qdrant Vector Database
  # ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚡ Redis Cache (Volatile — LRU eviction, no persistence)
  # ───────────────────────────────────────────────────
  redis_cache:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📦 Redis Persistent (Celery broker + result backend)
  # ───────────────────────────────────────────────────
  redis_persistent:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_persistent_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🔀 Nginx Reverse Proxy
  # ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Langfuse (LLM Observability) — critical for debug
  # ───────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/portfolio_db
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

# ───────────────────────────────────────────────────
# 💾 Persistent Volumes
# ───────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  redis_persistent_data:

# ───────────────────────────────────────────────────
# 🔒 Internal Network
# ───────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
