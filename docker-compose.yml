# ═══════════════════════════════════════════════════════════
# 🧠 AGENTIC PORTFOLIO SYSTEM — Docker Compose (Full Stack)
# ═══════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d              # Start everything
#   docker compose logs -f api        # Stream API logs
#   docker compose down -v            # Stop + remove volumes
# ═══════════════════════════════════════════════════════════

services:

  # ───────────────────────────────────────────────────
  # 🌐 Next.js Frontend (Port 3000)
  # ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐍 FastAPI Backend (Port 8000)
  # ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/portfolio_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚙️ Celery Worker (Async Task Processing)
  # ───────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/portfolio_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🕐 Celery Beat (Scheduled Tasks)
  # ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐘 PostgreSQL + pgvector
  # ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🗄️ Qdrant Vector Database
  # ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚡ Redis (Cache + Working Memory + Celery Broker)
  # ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🔀 Nginx Reverse Proxy
  # ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Langfuse (LLM Observability)
  # ───────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - NEXTAUTH_SECRET=langfuse-secret-change-me
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=langfuse-salt-change-me
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📈 Prometheus (Metrics Collection)
  # ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Grafana (Dashboards)
  # ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - internal

# ───────────────────────────────────────────────────
# 💾 Persistent Volumes
# ───────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  prometheus_data:
  grafana_data:

# ───────────────────────────────────────────────────
# 🔒 Internal Network
# ───────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
