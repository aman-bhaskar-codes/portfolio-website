# ═══════════════════════════════════════════════════════════
# 🧠 AGENTIC PORTFOLIO SYSTEM — Docker Compose (Full Stack)
# ═══════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d              # Start everything
#   docker compose logs -f api        # Stream API logs
#   docker compose down -v            # Stop + remove volumes
# ═══════════════════════════════════════════════════════════

services:

  # ───────────────────────────────────────────────────
  # 🌐 Next.js Frontend (Port 3000)
  # ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐍 FastAPI Backend (Port 8000)
  # ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - analytics_data:/app/data/analytics
    environment:
      # ── V1: Core Infrastructure ──
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/portfolio_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO

      # ── V2: Security Vault ──
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:-}

      # ── V2: Circuit Breaker ──
      - CB_FAILURE_THRESHOLD=5
      - CB_TIMEOUT_SECONDS=60
      - CB_SUCCESS_THRESHOLD=2

      # ── V2: LLM Model Routing ──
      - LLM_MODEL_HEAVY=phi4-mini
      - LLM_MODEL_MEDIUM=llama3.2:3b
      - LLM_MODEL_LIGHT=qwen2.5:3b
      - LLM_DAILY_TOKEN_LIMIT_HEAVY=500000
      - LLM_DAILY_TOKEN_LIMIT_MEDIUM=1000000
      - LLM_DAILY_TOKEN_LIMIT_LIGHT=2000000

      # ── V2: SSE / Streaming ──
      - MAX_SSE_CONNECTIONS=500
      - SSE_MAX_LIFETIME_SECONDS=300
      - SSE_IDLE_TIMEOUT_SECONDS=60

      # ── V2: Load Shedding ──
      - LOAD_SHED_THRESHOLD_1=50
      - LOAD_SHED_THRESHOLD_2=100
      - LOAD_SHED_THRESHOLD_3=200
      - LOAD_SHED_THRESHOLD_4=500

      # ── V2: Security ──
      - SECURITY_RISK_SCRUTINY=30
      - SECURITY_RISK_CHALLENGE=50
      - SECURITY_RISK_DELAY=75
      - SECURITY_RISK_SOFT_BAN=100
      - SECURITY_SOFT_BAN_HOURS=48

      # ── V2: Feature Flags ──
      - FEATURE_CLI_MODE=true
      - FEATURE_BUILD_WITH_ME=true
      - FEATURE_STUMP_CHALLENGE=true
      - FEATURE_TIME_MACHINE=true
      - FEATURE_LIVE_BUILD_WIDGET=true
      - FEATURE_VOICE_MODE=true
      - FEATURE_DEBATE_MODE=true
      - FEATURE_3D_CONSTELLATION=true
      - FEATURE_WEB_RESEARCH=true
      - FEATURE_OPPORTUNITY_AGENT=false

      # ── V3: Vision Model ──
      - OLLAMA_VISION_MODEL=llava-phi3

      # ── V3: ColBERT Retrieval ──
      - COLBERT_MODEL=colbert-ir/colbertv2.0
      - CROSS_ENCODER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2

      # ── V3: DSPy Optimization ──
      - DSPY_ENABLED=true
      - DSPY_IMPROVEMENT_THRESHOLD=0.05

      # ── V3: Ragas Evaluation ──
      - RAGAS_ENABLED=true
      - RAGAS_FAITHFULNESS_THRESHOLD=0.80

      # ── V3: DuckDB Analytics ──
      - DUCKDB_PATH=data/analytics/antigravity.duckdb

      # ── V3: MinIO (S3-Compatible Storage) ──
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}

      # ── V3: ntfy Push Notifications ──
      - NTFY_BASE_URL=http://ntfy:80
      - NTFY_TOPIC=portfolio-alerts
      - NTFY_ENABLED=true

      # ── V3: Umami Analytics ──
      - UMAMI_HOST=http://umami:3000
      - UMAMI_TRACKING_ID=${UMAMI_TRACKING_ID:-}

      # ── V3: Feature Flags ──
      - FEATURE_COLBERT_RETRIEVAL=true
      - FEATURE_VISION_PIPELINE=true
      - FEATURE_DSPY_OPTIMIZATION=true
      - FEATURE_RAGAS_EVALUATION=true
      - FEATURE_DUCKDB_ANALYTICS=true
      - FEATURE_MINIO_STORAGE=true
      - FEATURE_NTFY_NOTIFICATIONS=true
      - FEATURE_PWA=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚙️ Celery Worker (Async Task Processing)
  # ───────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/portfolio_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🕐 Celery Beat (Scheduled Tasks)
  # ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🐘 PostgreSQL + pgvector
  # ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🗄️ Qdrant Vector Database
  # ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # ⚡ Redis (Cache + Working Memory + Celery Broker)
  # ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🔀 Nginx Reverse Proxy
  # ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Langfuse (LLM Observability)
  # ───────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - NEXTAUTH_SECRET=langfuse-secret-change-me
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=langfuse-salt-change-me
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📈 Prometheus (Metrics Collection)
  # ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Grafana (Dashboards)
  # ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📦 MinIO (Self-Hosted S3 Storage) — V3
  # ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 🔔 ntfy (Push Notifications) — V3
  # ───────────────────────────────────────────────────
  ntfy:
    image: binwiederhier/ntfy:latest
    ports:
      - "8080:80"
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy
    restart: unless-stopped
    networks:
      - internal

  # ───────────────────────────────────────────────────
  # 📊 Umami (Privacy-First Analytics) — V3
  # ───────────────────────────────────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/portfolio_db
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${UMAMI_APP_SECRET:-umami-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

# ───────────────────────────────────────────────────
# 💾 Persistent Volumes
# ───────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:
  ntfy_data:
  analytics_data:

# ───────────────────────────────────────────────────
# 🔒 Internal Network
# ───────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
