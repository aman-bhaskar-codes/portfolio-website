worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ─── Basics ───
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Rate Limiting Zones ───
    # Anonymous: 20 req/min
    limit_req_zone $binary_remote_addr zone=anon:10m rate=20r/m;
    # Authenticated (by cookie-based key): 60 req/min
    limit_req_zone $http_x_user_id zone=auth:10m rate=60r/m;
    # LLM endpoint: stricter
    limit_req_zone $binary_remote_addr zone=llm:10m rate=10r/m;

    # ─── Upstream Servers ───
    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── Security Headers ───
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── API Routes ───
        location /api/ {
            limit_req zone=anon burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ─── WebSocket (Voice Agent) ───
        location /api/voice/ws {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Health Check (no rate limit) ───
        location /health {
            proxy_pass http://api/health;
        }

        # ─── Metrics (internal only in prod) ───
        location /metrics {
            proxy_pass http://api/metrics;
        }

        # ─── Frontend (Next.js) ───
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR WebSocket support (dev mode)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
