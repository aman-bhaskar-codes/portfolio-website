events { worker_connections 1024; }

http {
    proxy_buffering off;

    upstream api      { server api:8000; }
    upstream frontend { server frontend:3000; }

    server {
        listen 80;

        # ── FastAPI-only routes ──────────────────────────
        # /api/chat is a Next.js API route (handles RAG + Ollama streaming)
        # It goes to the frontend via the catch-all location / block below

        # FastAPI chat endpoint (used by direct API consumers)
        location /api/chat/chat {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection '';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            add_header         X-Accel-Buffering no;
        }

        # WebSocket voice → FastAPI
        location /api/voice {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Other FastAPI-specific endpoints
        location /api/brief {
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/webhook {
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v2/ {
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ping {
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ingest {
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # FastAPI docs
        location /docs {
            proxy_pass       http://api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass       http://api;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass       http://api;
            proxy_set_header Host $host;
        }

        # FastAPI health
        location = /health {
            proxy_pass       http://api;
            proxy_set_header Host $host;
        }

        # ── Everything else → Next.js frontend ──────────
        # This includes /api/projects, /api/auth, /api/cognitive, 
        # and all pages (/ai, /about, /projects, etc.)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection '';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
