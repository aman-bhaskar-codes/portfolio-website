version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: antigravity-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  frontend:
    container_name: antigravity-frontend
    build:
      context: .
      dockerfile: Dockerfile.dev
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
      - NEXT_PUBLIC_WS_URL=ws://localhost
      - NODE_ENV=development
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    container_name: antigravity-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file: .env
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  postgres:
    container_name: antigravity-postgres
    image: pgvector/pgvector:pg16
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antigravity}
      POSTGRES_USER: ${POSTGRES_USER:-antigravity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antigravity}"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  redis:
    container_name: antigravity-redis
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    container_name: antigravity-qdrant
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    container_name: antigravity-ollama
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:

networks:
  default:
    name: antigravity-network
