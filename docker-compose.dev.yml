# ═══════════════════════════════════════════════════════════
# ANTIGRAVITY OS v4 — DEV PROFILE
# Runs: frontend, api, postgres, redis, qdrant, ollama
# Does NOT run: langfuse, minio, celery, umami, ntfy, etc.
# Usage: make dev (or: docker compose -f docker-compose.dev.yml up --build -d)
# ═══════════════════════════════════════════════════════════

services:

  # ── 1. Frontend (Next.js) ─────────────────────────────────
  frontend:
    container_name: antigravity-frontend
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── 2. API (FastAPI) ──────────────────────────────────────
  api:
    container_name: antigravity-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── 3. PostgreSQL + pgvector ──────────────────────────────
  postgres:
    container_name: antigravity-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antigravity}
      POSTGRES_USER: ${POSTGRES_USER:-antigravity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_strong_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antigravity} -d ${POSTGRES_DB:-antigravity}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 4. Redis ──────────────────────────────────────────────
  redis:
    container_name: antigravity-redis
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI (dev only)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── 5. Qdrant (vector DB) ─────────────────────────────────
  qdrant:
    container_name: antigravity-qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 6. Ollama (LLM inference) ─────────────────────────────
  ollama:
    container_name: antigravity-ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Uncomment if you have NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_models:

networks:
  default:
    name: antigravity-network
